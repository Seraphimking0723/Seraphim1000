<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>運動科技 · 最大攝氧量 | 互動式報告</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #e6f0fa 0%, #d0e2f2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans TC', sans-serif;
      padding: 16px;
    }

    .report-card {
      max-width: 900px;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 40px;
      box-shadow: 0 25px 45px -12px rgba(25, 50, 80, 0.25), 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.7);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .card-header {
      padding: 24px 28px 16px;
      border-bottom: 1px solid rgba(45, 85, 130, 0.1);
    }

    .card-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #ffffff;
      margin-bottom: 0;
      text-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }

    /* 移除原先的副標區塊，因此subhead直接隱藏，或直接不用 */
    .subhead {
      display: none;
    }

    /* 主題按鈕群組 */
    .topic-bar {
      padding: 16px 24px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1px solid rgba(60, 100, 140, 0.08);
    }

    .topic-btn {
      background: white;
      border: none;
      padding: 10px 18px;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #103a58;
      box-shadow: 0 4px 10px -4px rgba(30, 60, 100, 0.12);
      border: 1px solid rgba(70, 130, 180, 0.3);
      cursor: pointer;
      transition: all 0.18s;
      backdrop-filter: blur(4px);
      background: rgba(255,255,255,0.85);
      flex: 0 0 auto;
      letter-spacing: 0.3px;
    }

    .topic-btn:hover {
      background: #c8dff5;
      border-color: #1e5a7a;
      transform: translateY(-2px);
      box-shadow: 0 10px 18px -8px #1e4f7a40;
    }

    .topic-btn.active {
      background: #1e5a7a;
      border-color: #0f3a5a;
      color: white;
      box-shadow: 0 8px 14px -6px #0f3a5a;
    }

    /* 內容主體 — 固定高度與內部捲動 */
    .content-pane {
      padding: 28px 28px 32px;
      background: rgba(255,255,255,0.55);
      height: 480px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .content-pane::-webkit-scrollbar {
      width: 6px;
    }
    .content-pane::-webkit-scrollbar-track {
      background: #e1edf7;
      border-radius: 10px;
    }
    .content-pane::-webkit-scrollbar-thumb {
      background: #6b9cbb;
      border-radius: 10px;
    }

    .theme-title {
      font-size: 1.9rem;
      font-weight: 700;
      color: #0c2e48;
      line-height: 1.3;
      margin-bottom: 20px;
      border-left: 7px solid #1e5a7a;
      padding-left: 22px;
    }

    .theme-content {
      color: #1a3b52;
      font-size: 1.05rem;
      line-height: 1.65;
    }

    .theme-content p {
      margin-bottom: 1.2rem;
    }

    .theme-content strong {
      color: #0f3f60;
      font-weight: 650;
    }

    .highlight {
      background: linear-gradient(120deg, #d9eaf8 0%, #bdd9f0 70%);
      padding: 3px 6px;
      border-radius: 12px;
      font-weight: 500;
      color: #0c2e48;
    }

    .insight-box {
      background: #d4e5f5c0;
      border-radius: 24px;
      padding: 20px 24px;
      margin: 24px 0 10px;
      border-left: 6px solid #1e5a7a;
      font-weight: 500;
      backdrop-filter: blur(4px);
      color: #0f3550;
    }

    /* 導航列 */
    .nav-controls {
      padding: 16px 28px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(45, 100, 140, 0.1);
    }

    .nav-arrows {
      display: flex;
      gap: 16px;
    }

    .nav-btn {
      background: white;
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px -6px #1e4f7a30;
      border: 1px solid #b0cde0;
      cursor: pointer;
      transition: 0.15s;
      color: #1e5a7a;
      font-size: 1.8rem;
      font-weight: 300;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(4px);
    }

    .nav-btn:hover {
      background: #1e5a7a;
      color: white;
      border-color: #0f3a5a;
      transform: scale(1.02);
    }

    .page-indicator {
      font-weight: 600;
      color: #0f3a5a;
      background: #d9eaf8;
      padding: 10px 22px;
      border-radius: 60px;
      font-size: 1rem;
      border: 0.5px solid #6b9cbb;
    }

    .footer-note {
      text-align: right;
      padding: 6px 28px 20px;
      color: #1e4f6e;
      font-size: 0.85rem;
      opacity: 0.95;
      font-weight: 500;
    }

    /* 手機調整 */
    @media (max-width: 600px) {
      body { padding: 10px; }
      .report-card { border-radius: 32px; }
      .card-header h1 { font-size: 1.6rem; }
      .topic-bar { padding: 12px 18px; gap: 8px; }
      .topic-btn { padding: 8px 14px; font-size: 0.8rem; }
      .content-pane { padding: 20px 18px; height: 420px; }
      .theme-title { font-size: 1.5rem; padding-left: 16px; }
      .nav-btn { width: 46px; height: 46px; font-size: 1.6rem; }
      .page-indicator { padding: 8px 16px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
<div class="report-card">
  <div class="card-header">
    <h1>運動科技與最大攝氧量提升</h1>
    <!-- 原先的subhead區塊已移除，因此不顯示任何副標 -->
  </div>

  <!-- 八個主題按鈕 -->
  <div class="topic-bar" id="topicButtonContainer"></div>

  <!-- 主要內容顯示區（固定高度＋內部捲動） -->
  <div class="content-pane" id="contentPane">
    <div class="theme-title" id="themeTitle">主題一：為什麼很多人有運動，卻沒有明顯進步</div>
    <div class="theme-content" id="themeContent"></div>
  </div>

  <!-- 下方導航 + 頁碼 -->
  <div class="nav-controls">
    <div class="nav-arrows">
      <button class="nav-btn" id="prevBtn" aria-label="上一主題">←</button>
      <button class="nav-btn" id="nextBtn" aria-label="下一主題">→</button>
    </div>
    <div class="page-indicator" id="pageIndicator">1 / 8</div>
  </div>
  <div class="footer-note">
    整合13篇研究文獻 · 訓練強度分配是關鍵
  </div>
</div>

<script>
  (function(){
    "use strict";

    // 主題資料
    const themes = [
      { 
        title: "主題一：為什麼很多人有運動，卻沒有明顯進步",
        content: `
          <p><strong>開場提問</strong> — 今天我要報告的主題是如何運用運動科技來提升最大攝氧量，這份報告會以一篇整合多項研究的文獻作為基礎，去說明不同訓練方式以及運動科技之間的關係。透過這些研究結果，我們可以更清楚理解為什麼有些人運動效果很好，而有些人卻沒有明顯進步。</p>
          <p><strong>為什麼很多人明明有在運動，但進步卻不明顯？</strong> 有些人每週都固定跑步或健身，也投入不少時間和體力，甚至每次都流很多汗，可是過了一段時間之後，卻發現自己的體能沒有太大的變化。這時候我們就會開始懷疑，運動的效果是不是只和努力程度有關，還是其實還有其他更關鍵的因素在影響。</p>
          <p><strong>常見迷思</strong> — 很多人覺得每一次都要練到很累、很喘，才算是有效的訓練，或者認為流越多汗代表效果越好。但身體感受到的疲累不一定等於真正有效的訓練，如果強度安排不正確，反而可能讓身體長期處在過度疲勞的狀態，進而影響訓練效果甚至造成反效果。</p>
          <p><strong>運動科技改變情境</strong> — 現在越來越多人使用智慧手錶、心率帶或運動App，這些工具可以幫助我們記錄心率變化、時間、距離、配速。我們有能力更精準地了解自己的運動狀況，而不只是依賴主觀感受。</p>
          <div class="insight-box">小結論：問題不在於有沒有運動，而是「怎麼運動」。關鍵是訓練方式，特別是訓練強度的分配是否正確。</div>
        `
      },
      { 
        title: "主題二：最大攝氧量到底是什麼",
        content: `
          <p><strong>核心概念</strong> — 如果我們不知道最大攝氧量在講什麼，就很難理解為什麼不同的訓練方式會產生不同的效果，也就無法判斷哪些訓練是有效的。</p>
          <p><strong>白話解釋</strong> — 最大攝氧量就是當我們在做高強度運動時，身體能夠利用氧氣的最大能力。換句話說，身體在最極限狀態下，可以把多少氧氣轉換成能量來支撐運動。這個數值越高，通常代表心肺功能越好，身體運作效率也越高。</p>
          <p><strong>為什麼重要？</strong> — 它直接影響耐力型運動表現（跑步、騎車、游泳）。最大攝氧量越高，在相同強度下比較不容易疲勞，也比較能維持長時間的運動表現。</p>
          <p><strong>一句話總結</strong> — 最大攝氧量其實就是在決定「你能不能長時間維持穩定的運動表現」，是耐力表現的關鍵基礎能力。</p>
        `
      },
      { 
        title: "主題三：我們到底該怎麼分配訓練強度",
        content: `
          <p><strong>核心問題</strong> — 如果目標是提升最大攝氧量，訓練強度到底應該怎麼分配？重點不再只是有沒有運動，而是不同強度之間是怎麼安排的。</p>
          <p><strong>文獻基礎</strong> — 這篇文獻整理了13篇相關研究，總共包含348位耐力型運動員，去比較不同訓練方式對最大攝氧量以及運動表現的影響。是整合分析的結論，具有代表性。</p>
          <p><strong>三個強度區間</strong><br> 
          • 低強度：運動中可輕鬆聊天<br>
          • 中等強度：呼吸變快，有點喘但能持續<br>
          • 高強度：幾乎無法說出完整句子，呼吸急促</p>
          <p><strong>極化式訓練 (POL)</strong> — 大部分時間在低強度，搭配一小部分高強度，幾乎不安排中等強度。兩端很多，中間很少。</p>
          <p><strong>金字塔式訓練 (PYR)</strong> — 低強度最多，中等強度其次，高強度最少。形狀像金字塔。</p>
          <p><strong>最大差別</strong> — 極化式是高強度＞中等強度；金字塔式是中等強度＞高強度。真正的差異在中高強度的取捨。</p>
        `
      },
      { 
        title: "主題四：有沒有一種最有效的訓練方式",
        content: `
          <p><strong>直覺問題</strong> — 極化式訓練和金字塔式訓練，到底哪一種比較有效？很多人直覺會覺得應該有一個更好的方法。</p>
          <p><strong>出乎意料的結果</strong> — 文獻發現，這兩種訓練方式在提升最大攝氧量和運動表現上，<strong>並沒有顯著差異</strong>。沒有任何一種方法是明顯優於另一種的。</p>
          <p><strong>不代表沒用</strong> — 兩種方式都能有效提升能力，只是效果差距沒有大到可以說哪一種一定比較好。重點不在選擇唯一最佳方法，而是理解特性。</p>
          <p><strong>但事情沒那麼簡單</strong> — 文獻進一步發現，真正造成差異的是「不同的人」。同樣的訓練方式，對不同的人效果可能不一樣。</p>
        `
      },
      { 
        title: "主題五：為什麼同一種訓練，對不同人效果不一樣",
        content: `
          <p><strong>人的差異是關鍵</strong> — 重點從訓練本身，轉移到「人」的差異。</p>
          <p><strong>競技型運動員</strong> — 極化式訓練效果通常較好。因為他們已有訓練基礎，身體對低、中強度刺激較適應，需要更高強度刺激才能進步。</p>
          <p><strong>一般休閒運動者 / 訓練程度較低</strong> — 金字塔式訓練反而比較適合。中等強度本身就足夠產生適應效果，不需要太多高強度刺激。</p>
          <p><strong>重要結論</strong> — <span class="highlight">沒有一種訓練方式是對所有人都最好的。真正重要的不是找到一個最強的方法，而是找到最適合自己的方式。</span></p>
          <p><strong>計畫 vs 實際</strong> — 訓練計畫不等於實際訓練。教練設計的強度分配，和運動員實際執行常有落差。</p>
          <p><strong>常見落差原因</strong> — 很多人憑感覺運動，該輕鬆時不夠輕鬆，該高強度時又不夠刺激。文獻關鍵發現：很多人其實沒有真正去控制訓練強度。</p>
          <p><strong>引出運動科技</strong> — 如果人很難精準控制強度，那有沒有方法可以幫助我們？這就是運動科技登場的原因。</p>
        `
      },
      { 
        title: "主題六：運動科技，到底幫了我們什麼",
        content: `
          <p><strong>科技角色</strong> — 智慧手錶、心率帶、運動App，到底只是看到數據，還是真的能提升訓練效果？</p>
          <p><strong>三大功能</strong> — 監測（心率變化）、記錄（時間/距離/配速）、分析（強度分布）。把憑感覺的運動轉變成可觀察、可理解的過程。</p>
          <p><strong>心率是關鍵指標</strong> — 心率幫助判斷當下是低、中、高強度。把抽象的強度概念量化，精準掌握狀態。</p>
          <p><strong>常見錯誤</strong> — 多數人以為自己在低強度，但心率已進入中等甚至高強度。不自覺偏離目標。</p>
          <p><strong>文獻發現</strong> — 透過心率數據分析才發現，很多運動員的強度分布和計畫不一致。沒有科技很難察覺。</p>
          <p><strong>運動科技價值</strong> — <span class="highlight">不只是看到更多數據，而是幫助我們修正訓練方式，讓訓練變得更精準，而不是更辛苦。</span></p>
          <p><strong>握力器輔助疲勞判斷</strong> — 身體疲勞時神經肌肉表現下降，握力會降低。每天固定時間測量握力，若明顯下降代表尚未完全恢復，應避免高強度訓練。科技幫助我們判斷何時該休息。</p>
        `
      },
      { 
        title: "主題七：我們要怎麼用科技，才真的能提升最大攝氧量",
        content: `
          <p><strong>初學者 / 運動量少者</strong> — 適合以低強度為主，搭配一部分中等強度，加入少量高強度。中等強度已能產生明顯效果，不需過多高強度。分配接近金字塔式訓練，容易長期維持。</p>
          <p><strong>已有訓練基礎 / 競技型</strong> — 可增加高強度比例，但仍需保留大量低強度訓練。接近極化式訓練，需要更強刺激才能持續進步。</p>
          <p><strong>共同關鍵</strong> — <strong>一定要透過運動科技確認訓練強度</strong>。只依靠感覺很容易偏離目標。不論哪種程度，心率監測與強度區間控制都是必要的。</p>
          <div class="insight-box">用科技把「感覺」變成「數據」，再依照自己的程度選擇強度分配，才能真正提升最大攝氧量。</div>
        `
      },
      { 
        title: "主題八：最後，我們應該記住什麼",
        content: `
          <p><strong>回到原點</strong> — 如何有效提升最大攝氧量？整理幾個重點。</p>
          <p><strong>① 訓練不是越累越有效</strong> — 很多人直覺認為越辛苦效果越好，但如果強度安排不正確，反而可能讓效果變差，影響恢復。</p>
          <p><strong>② 關鍵在強度分配</strong> — 低、中、高強度之間的比例，而不是單純的運動時間或流多少汗。</p>
          <p><strong>③ 不同程度，適合不同方式</strong> — 競技型運動員：極化式可能更有效；一般休閒運動者：金字塔式更適合。<br>
          <span class="highlight">訓練的重點不是找到一個最強的方法，而是找到最適合自己的方式。</span></p>
          <p style="margin-top:20px;"><strong>運動科技的角色</strong> — 幫助我們「看見」強度、「修正」計畫、「判斷」恢復，讓每一次訓練都更靠近目標。</p>
        `
      }
    ];

    const topicBtnContainer = document.getElementById('topicButtonContainer');
    const themeTitleEl = document.getElementById('themeTitle');
    const themeContentEl = document.getElementById('themeContent');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageIndicator = document.getElementById('pageIndicator');

    let currentIndex = 0;
    const totalThemes = themes.length;

    function renderTopicButtons() {
      topicBtnContainer.innerHTML = '';
      themes.forEach((_, idx) => {
        const btn = document.createElement('button');
        btn.className = 'topic-btn' + (idx === currentIndex ? ' active' : '');
        btn.textContent = `主題${idx+1}`;
        btn.setAttribute('data-index', idx);
        btn.addEventListener('click', () => {
          if (idx !== currentIndex) setCurrentTheme(idx);
        });
        topicBtnContainer.appendChild(btn);
      });
    }

    function updateActiveButton(index) {
      const buttons = topicBtnContainer.querySelectorAll('.topic-btn');
      buttons.forEach((btn, i) => btn.classList.toggle('active', i === index));
    }

    function updateContent(index) {
      const theme = themes[index];
      themeTitleEl.textContent = theme.title;
      themeContentEl.innerHTML = theme.content;
      pageIndicator.textContent = `${index+1} / ${totalThemes}`;
      updateActiveButton(index);
      document.getElementById('contentPane').scrollTop = 0;
    }

    function setCurrentTheme(index) {
      let newIndex = index % totalThemes;
      if (newIndex < 0) newIndex += totalThemes;
      currentIndex = newIndex;
      updateContent(currentIndex);
    }

    function nextTheme() { setCurrentTheme(currentIndex + 1); }
    function prevTheme() { setCurrentTheme(currentIndex - 1); }

    prevBtn.addEventListener('click', prevTheme);
    nextBtn.addEventListener('click', nextTheme);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); prevTheme(); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); nextTheme(); }
    });

    function init() {
      renderTopicButtons();
